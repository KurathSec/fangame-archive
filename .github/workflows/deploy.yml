name: Sync and Deploy Fangame Archive

on:
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours
  workflow_dispatch:      # Enable manual triggering from GitHub Action UI
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'pipelines/**'
      - 'wrangler.toml'
      - '.github/workflows/**'
      - 'package.json'
      - 'package-lock.json'
      - 'requirements.txt'

# Serialize runs: the 6-hourly cron and a push must never run at the same time, or
# two pipelines race on the R2 master games.json and collide the version counter
# (see project_architecture.md §8.5 rebase caution / §10). Queue, don't cancel, so an
# in-flight sync finishes cleanly.
concurrency:
  group: fangame-archive-deploy
  cancel-in-progress: false

# Least privilege: the job deploys to Cloudflare Pages via an API token; it does not
# push back to the repository.
permissions:
  contents: read

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node Dependencies
        # esbuild (used by build_github_pages.py, invoked inside the scraper step) and
        # wrangler (used by the deploy step) come from the pinned devDependencies.
        run: npm ci

      - name: Install Engine Recognition Tools
        # Used by pipelines/engine_recognition.py (invoked inside the scraper step):
        # 7zz extracts game archives (7zip-rar adds the RAR codec; if it is ever
        # unavailable, RAR games simply record a failed attempt) and upx unpacks
        # UPX-compressed game executables before signature detection.
        run: |
          sudo apt-get update
          sudo apt-get install -y 7zip upx-ucl
          sudo apt-get install -y 7zip-rar || echo "::warning::7zip-rar unavailable; RAR archives will not be recognized"

      - name: Download Databases from R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python pipelines/sync_db_r2.py download

      # Stamps release_date from the committed data/release_dates.json artifact
      # onto any games still missing it (bumps DATABASE_VERSION with no timeline
      # entry -> one full client reload). No-ops with zero assignments, so it is
      # safe to keep permanently. Needs no secrets: local files + public wiki API.
      - name: Backfill Release Dates (idempotent)
        run: python pipelines/backfill_release_dates.py --apply --ci

      - name: Merge Approved Game Submissions
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python pipelines/merge_approved_submissions.py

      - name: Apply Admin Game Operations
        # Drains the D1 `game_ops` queue written by the admin panel
        # (delete / clear_link / replace_link) into games.json + R2.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python pipelines/apply_game_ops.py

      - name: Run Scraper and Compilation Pipeline
        # CLOUDFLARE_API_TOKEN is required so the in-pipeline D1 review sync
        # (npx wrangler d1 execute) can authenticate; without it the scrape
        # succeeds but new reviews never reach the D1 comments table.
        # This step also invokes build_github_pages.py, which precompiles the JSX
        # with esbuild (installed by `npm ci` above).
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python pipelines/scrape_and_migrate_new_games.py

      - name: Sync Screenshots to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python pipelines/sync_screenshots_to_r2.py

      - name: Upload Updated Databases back to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python pipelines/sync_db_r2.py upload

      - name: Deploy Compiled Site to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy github_pages_dist --project-name fangame-archive
