name: Backfill Reviews to D1

# One-shot, manually-triggered reconciliation: pushes every scraped review in
# reviews_scraped.json into the D1 comments table (source='imported',
# status='approved'). Idempotent — the unique (game_id,user,content) index and the
# named delete+insert mean re-running is safe. Run this once to clear the backlog
# that accumulated while the scraper's D1 sync was unauthenticated; the regular
# 6-hourly workflow keeps D1 current afterward.

on:
  workflow_dispatch:

jobs:
  backfill-reviews:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests boto3

      - name: Download Databases from R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python pipelines/sync_db_r2.py download

      - name: Backfill Reviews into D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python pipelines/sync_reviews_to_d1.py apply
